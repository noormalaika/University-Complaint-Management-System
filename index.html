<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AU Complaint Management System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<style>
:root {
  --navy: #1a2744;
  --navy2: #243255;
  --amber: #e8a020;
  --amber2: #f5b840;
  --white: #ffffff;
  --gray1: #f4f6fb;
  --gray2: #e8ecf4;
  --gray3: #b0bcd4;
  --text: #1e2840;
  --sub: #4a5578;
  --red: #d94040;
  --green: #27a060;
  --shadow: 0 2px 16px rgba(26,39,68,.10);
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--gray1);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--navy);
  color: var(--white);
  padding: 0 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  min-height: 64px;
  box-shadow: 0 2px 12px rgba(0,0,0,.25);
  position: sticky;
  top: 0;
  z-index: 100;
}
.brand { display: flex; align-items: center; gap: .75rem; min-width: 220px; }
.brand-icon {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  background: var(--amber);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.25rem;
}
.brand-text h1 { font-size: 1rem; font-weight: 700; letter-spacing: .02em; }
.brand-text p { font-size: .7rem; opacity: .7; }
nav { display: flex; gap: .25rem; flex-wrap: wrap; justify-content: center; }
nav button {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.75);
  padding: .45rem .9rem;
  border-radius: 6px;
  cursor: pointer;
  font-size: .85rem;
  transition: all .2s;
}
nav button:hover,
nav button.active { background: rgba(255,255,255,.12); color: var(--white); }

#connectBtn {
  background: var(--amber);
  color: var(--navy);
  border: none;
  padding: .45rem 1.1rem;
  border-radius: 6px;
  font-weight: 700;
  cursor: pointer;
  font-size: .82rem;
  transition: background .2s;
  white-space: nowrap;
}
#connectBtn:hover { background: var(--amber2); }
#walletInfo { font-size: .75rem; color: var(--amber2); text-align: right; }

.hero {
  background: linear-gradient(135deg, var(--navy) 60%, var(--navy2));
  color: var(--white);
  padding: 2.5rem 2rem 2rem;
  border-bottom: 3px solid var(--amber);
}
.hero h2 { font-size: 1.5rem; font-weight: 700; }
.hero p { font-size: .9rem; opacity: .78; margin-top: .3rem; max-width: 600px; }
